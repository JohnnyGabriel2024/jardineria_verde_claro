<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VerdeClaro Jardinería | Servicios de jardinería y paisajismo residencial y comercial</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-dark: #1a2b3c;
        --primary-gold: #c9a959;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a2b3c 0%, #2c3e50 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
      }
      .thankyou-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeInUp 0.8s ease;
      }
      .thankyou-icon {
        font-size: 4rem;
        color: #28a745;
        margin-bottom: 20px;
      }
      h1 {
        color: var(--primary-dark);
        margin-bottom: 20px;
      }
      p {
        color: #5d6f7f;
        margin-bottom: 30px;
        font-size: 1.1rem;
      }
      .btn-home {
        background-color: var(--primary-gold);
        color: var(--primary-dark);
        padding: 12px 30px;
        border-radius: 40px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s;
        display: inline-block;
      }
      .btn-home:hover {
        background-color: #b8943d;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        color: var(--primary-dark);
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .social-links {
        margin-top: 30px;
      }
      .social-links a {
        color: var(--primary-dark);
        margin: 0 10px;
        font-size: 1.3rem;
        transition: color 0.3s;
      }
      .social-links a:hover {
        color: var(--primary-gold);
      }
    </style>
  </head>
  <body>
    <div class="thankyou-card">
      <div class="thankyou-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h1>¡Gracias por contactar a VerdeClaro Jardinería!</h1>
      <p>
        Hemos recibido tu mensaje correctamente. En breve uno de nuestros
        asesores se comunicará contigo para ayudarte con tu consulta.
      </p>
      <a href="/" class="btn-home">Volver al inicio</a>

      <div class="social-links">
        <a href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
      </div>

      <p class="mt-3 small text-muted">
        ¿Necesitas ayuda inmediata? Escríbenos por WhatsApp
      </p>
    </div>
  </body>
</html>
